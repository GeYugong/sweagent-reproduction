analysis_preregistration:
  primary_outcome: RESOLVED_FULL
  denominator: all 23 instances times four repetitions for each configuration
  primary_comparisons: eight variants versus default ACI
  paired_test: two-sided exact McNemar matched by instance and repetition
  multiple_testing: Holm family-wise correction across eight primary comparisons
  effect_interval: 10000 cluster-bootstrap resamples by instance, retaining all repetitions within each cluster
  bootstrap_seed: 42
  secondary_outcomes:
    - NOT_GENERATED
    - PATCH_APPLY_FAILED
    - RESOLVED_NO
    - RESOLVED_PARTIAL
    - model calls
    - input and output tokens
    - turns and exit status
  result_driven_extension_allowed: false

completion_contract:
  public_artifact_outputs_terminal: 54
  public_artifact_outputs_required: 54
