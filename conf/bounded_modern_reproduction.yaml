  scorecards_required: true
  paired_analysis_required: true
  cost_and_failure_ledger_required: true
  comprehensive_report_update_required: true
  clean_git_commit_required: true
  completion_independent_of_effect_direction_or_significance: true
  completion_flag_initial: false

stop_rules:
  - Do not add a fifth repetition, new model, new prompt, new configuration, or Lite test run after R4.
  - Do not extend the experiment because an effect is insignificant or disagrees with the paper.
  - At 50 C0, do not start another repetition; contingency may only finish the current preregistered repetition.
  - At 80 C0, stop before the next paid request under all circumstances.
  - After R4, evaluation, preregistered analysis, artifact hashing, report update, and Git commit, set only BOUNDED_MODERN_REPRODUCTION_COMPLETE and stop the experiment.
