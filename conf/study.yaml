  smoke_instances: 1
  dev_instances: 20
  formal_instances: 300
  seed: 42
  retry_policy: no_automatic_retry

tracking:
  registry: logs/experiment_registry.csv
  narrative_log: logs/experiment_log.md
  raw_outputs: outputs
