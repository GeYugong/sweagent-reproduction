project:
  name: sweagent-reproduction
  objective: full_paper_reproduction
  local_root: D:/0code/Research/05
  server_root: /public/home/mty/GeYugong/05_sweagent_repro_ser

paper:
  arxiv_id: "2405.15793"
  version: v3
  pdf: paper/2405.15793_SWE-agent.pdf
  source: paper/2405.15793_source.tar.gz

upstream:
  repository: https://github.com/SWE-agent/SWE-agent.git
  paper_snapshot: 658eb2842e8a8b00069b301338bc342b70538f7a
  reference_release: v0.7.0

official_artifacts:
  swebench_experiments_repository: https://github.com/SWE-bench/experiments
  swebench_current_commit: 2f15350cd32becc4569e0d826361048555b605c0
  swebench_paper_history_commit: a5d52722965c791c0c04d18135f906b44f716d39
  humanevalfix_repository: https://github.com/SWE-bench/humanevalfix-results
  humanevalfix_commit: bbd565c9035f873ba5ee2c1bd1d65c5ee2d85d1a

paper_configuration:
  model: gpt-4-1106-preview
  temperature: 0.0
  file_window_lines: 100
  history_processor: Last5Observations
  demonstration: true
  linting_editor: true
  summarized_search: true
  per_instance_budget_usd: 4.0

paper_models:
  gpt4_turbo: gpt-4-1106-preview
  claude_3_opus: claude-3-opus-20240229
  failure_labeler: gpt-4o-2024-05-13
  exact_models_available_from_current_relay: false

anthropic_relay_audit:
  api_style: messages
  exact_paper_model_status: model_not_found
  available_models: [claude-opus-4-6, claude-opus-4-7, claude-opus-4-8, claude-sonnet-4-6]
  credentials_file: secrets/anthropic.env
  pricing: unknown

resources:
  primary_execution: local_wsl2
  model_inference: remote_openai_compatible_api
  max_gpus: 0
  container_backend: docker_engine_wsl2
  max_parallel_instances: 1

modern_replication:
  primary_model: gpt-5.6-terra
  smoke_model: gpt-5.4-mini
  api_style: chat_completions
  temperature: 0.0
  top_p: 0.95
  relay_pricing: unknown
  accounting: tokens_and_api_calls
  max_api_calls_per_instance: 25

exploratory_combined_ablation:
  variant: custom_no_search_plus_no_editor
  config_source: conf/weak_aci_no_search_editor.yaml
  paper_aligned: false
  include_in_paper_primary_results: false
  unchanged: [model, temperature, top_p, max_api_calls, window, history_processor, demonstrations]
  removed_command_files: [config/commands/search.sh, config/commands/edit_linting.sh]

evaluation:
  benchmark: SWE-bench Lite
  smoke_instances: 1
  dev_instances: 20
  dev_manifest: data/manifests/swebench_lite_dev20_seed42.json
  formal_instances: 300
  full_instances: 2294
  hyperparameter_dev_instances: 37
  hyperparameter_configurations: 16
  hyperparameter_samples: 5
  pass_at_k_runs: 6
  humanevalfix_instances_per_language: 164
  seed: 42
  retry_policy: no_automatic_retry

full_reproduction:
  plan: docs/full_paper_reproduction_plan.md
  matrix: conf/full_paper_matrix.yaml
  minimum_unique_agent_episodes: 13140
  evidence_types: [artifact, exact, modern, exploratory]
  relay_pricing_required_before_scale_up: true
  minimum_free_disk_gb_before_formal_scale_up: 120
  artifact_reproduction:
    swebench_main_rows: complete_with_claude_paper_inconsistency
    humanevalfix: complete_with_notebook_denominator_bug

tracking:
  registry: logs/experiment_registry.csv
  narrative_log: logs/experiment_log.md
  raw_outputs: outputs
