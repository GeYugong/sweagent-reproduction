schema_version: 1
as_of: "2026-07-16"
objective: full_paper_reproduction

evidence_types:
  artifact:
    description: Recompute published results from authors' original artifacts.
    substitutes_for_exact_run: false
  exact:
    description: Rerun with the paper model, code, data, configuration, and budget.
    substitutes_for_artifact: false
  modern:
    description: Re-test paper claims with a currently available model.
    substitutes_for_exact_run: false
  exploratory:
    description: Debugging or non-paper-aligned experiment excluded from primary results.
    substitutes_for_exact_run: false

frozen_inputs:
  paper:
    arxiv_id: "2405.15793"
    version: v3
    pdf: paper/2405.15793_SWE-agent.pdf
    source: paper/2405.15793_source.tar.gz
  sweagent_commit: 658eb2842e8a8b00069b301338bc342b70538f7a
  paper_models:
    gpt4_turbo: gpt-4-1106-preview
    claude_3_opus: claude-3-opus-20240229
    failure_labeler: gpt-4o-2024-05-13
  official_artifacts:
    swebench_repository: https://github.com/SWE-bench/experiments
    swebench_current_commit: 2f15350cd32becc4569e0d826361048555b605c0
    swebench_paper_history_commit: a5d52722965c791c0c04d18135f906b44f716d39
    humanevalfix_repository: https://github.com/SWE-bench/humanevalfix-results
    humanevalfix_commit: bbd565c9035f873ba5ee2c1bd1d65c5ee2d85d1a
  datasets:
    swebench_full_test: 2294
    swebench_lite_test: 300
    swebench_dev_sweep: 37
    humanevalfix_per_language: 164
  per_instance_budget_usd: 4.0

gates:
  - id: G_MODEL_GPT4_TURBO
    status: BLOCKED_UNAVAILABLE
    evidence: Current relay model catalog does not expose gpt-4-1106-preview.
  - id: G_MODEL_CLAUDE_3_OPUS
    status: BLOCKED_UNAVAILABLE
    evidence: Anthropic Messages probe returned model_not_found for claude-3-opus-20240229; the current catalog exposes only Claude Opus 4.6/4.7/4.8 and Sonnet 4.6.
  - id: G_MODEL_FAILURE_LABELER
    status: BLOCKED_UNAVAILABLE
    evidence: Current relay model catalog does not expose gpt-4o-2024-05-13.
  - id: G_OFFICIAL_ARTIFACTS
    status: PARTIALLY_RECOVERED
    evidence: Official pre-reset Git history contains main GPT-4/Claude/RAG predictions, logs, trajectories, and results; HumanEvalFix has released logs and 492 trajectories. An exhaustive source, Git/PR, analysis-tree, and public-S3 audit found no Shell-only, ablation, sweep, pass@k, or raw failure-label artifacts; these are now explicit missing-official blockers.
  - id: G_EXACT_ABLATION_CONFIGS
    status: BLOCKED_PARTIAL_RELEASE
    evidence: Default and FullHistory configs plus 100/200-window parameter implementations are public. No official paper-era full-file viewer, no-lint editor, iterative search, Shell-only config, or raw ablation runs were found across 822 PR heads and official artifact storage.
  - id: G_DEV37_MANIFEST
    status: BLOCKED_MISSING_PROVENANCE
    evidence: Paper specifies a random 37-instance dev subset but does not list instance IDs in the source package.
  - id: G_HUMANEVAL_LANGUAGE
    status: COMPLETE
    evidence: Official release contains exactly 164 trajectories for Python, JavaScript, and Java and no Go run; the appendix Go reference is a typo.
  - id: G_API_PRICING_AND_BUDGET
    status: BLOCKED_UNKNOWN_PRICE
    evidence: Relay pricing is unknown; unknown price is not treated as zero.
  - id: G_FORMAL_DISK
    status: BLOCKED_CAPACITY
    evidence: Artifact-history recovery left approximately 78 GB free on D, below the 120 GB formal-run threshold.
  - id: G_EVALUATOR_REPLAY
    status: IN_PROGRESS
    evidence: Dev20 evaluation works; published official prediction replay has not yet been validated.

episode_accounting:
  main_full_default: 4588
  main_lite_default: 600
  shell_only_and_no_demo: 600
  eight_lite_ablations: 2400
  hyperparameter_sweep: 2960
  pass_at_k_total: 1800
  pass_at_k_increment_if_main_lite_reused: 1500
  humanevalfix: 492
  minimum_unique_agent_episodes: 13140
  maximum_without_proven_reuse: 13440
  rag_if_regenerated: 4588
  failure_label_requests: 248
  dev20_projection_for_minimum_unique:
    api_calls: 260829
    input_tokens: 3611494179
    output_tokens: 46256085
    sequential_days_at_10_minutes: 91.2
    paper_budget_ceiling_usd: 52560

