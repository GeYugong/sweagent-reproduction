schema_version: 2
as_of: "2026-07-17"
objective: full_paper_reproduction

completion_contract:
  public_artifact_reproduction_complete: true
  exact_model_rerun_complete: false
  modern_replication_complete: false
  strict_full_paper_reproduction_complete: false
  strict_completion_rule: public_artifact_reproduction_complete AND exact_model_rerun_complete
  output_inventory: conf/paper_output_inventory.yaml
  reproduction_report: docs/reproduction_report.md

global_exact_requires:
  - G_EXACT_RUNTIME_PROMPTS
  - G_EXPERIMENT_BUDGET_AUTHORIZATION

evidence_types:
  source:
    description: Reconstruct targets and released assets from the frozen paper source package.
    substitutes_for_exact_run: false
  artifact:
    description: Recompute published results from authors' original artifacts.
    substitutes_for_exact_run: false
  exact:
    description: Rerun with the paper model, code, data, configuration, and budget.
    substitutes_for_artifact: false
  modern:
    description: Re-test paper claims with a currently available model.
    substitutes_for_exact_run: false
  exploratory:
    description: Debugging or non-paper-aligned experiment excluded from primary results.
    substitutes_for_exact_run: false

