gates:
  - id: G_MODEL_GPT4_TURBO
    status: BLOCKED_UNAVAILABLE
    evidence: Current relay model catalog does not expose gpt-4-1106-preview.
  - id: G_MODEL_CLAUDE_3_OPUS
    status: BLOCKED_UNAVAILABLE
    evidence: Anthropic Messages probe returned model_not_found for claude-3-opus-20240229; the current catalog exposes only Claude Opus 4.6/4.7/4.8 and Sonnet 4.6.
  - id: G_MODEL_FAILURE_LABELER
    status: BLOCKED_UNAVAILABLE
    evidence: Current relay model catalog does not expose gpt-4o-2024-05-13.
  - id: G_OFFICIAL_ARTIFACTS
    status: PARTIALLY_RECOVERED
    evidence: Official pre-reset Git history contains main GPT-4/Claude/RAG predictions, logs, trajectories, and results; HumanEvalFix has released logs and 492 trajectories. An exhaustive source, Git/PR, analysis-tree, and public-S3 audit found no Shell-only, ablation, sweep, pass@k, or raw failure-label artifacts; these are now explicit missing-official blockers.
  - id: G_EXACT_ABLATION_CONFIGS
    status: BLOCKED_PARTIAL_RELEASE
    evidence: Default and FullHistory configs plus 100/200-window parameter implementations are public. No official paper-era full-file viewer, no-lint editor, iterative search, Shell-only config, or raw ablation runs were found across 822 PR heads and official artifact storage.
  - id: G_EXACT_RUNTIME_PROMPTS
    status: BLOCKED_PARTIAL_RELEASE
    evidence: Released trajectories recover one instance template, one demonstration, Last5Observations, and two system-prompt variants across 2,568 trajectories, but the exact per-run mixed work tree and 26 GPT-4 Full/Lite trajectory records are not public.
  - id: G_DEV37_MANIFEST
    status: BLOCKED_MISSING_PROVENANCE
    evidence: Paper specifies a random 37-instance dev subset but does not list instance IDs in the source package.
  - id: G_HUMANEVAL_LANGUAGE
    status: COMPLETE
    evidence: Official release contains exactly 164 trajectories for Python, JavaScript, and Java and no Go run; the appendix Go reference is a typo.
  - id: G_API_PRICING_AND_BUDGET
    status: BLOCKED_UNKNOWN_PRICE
    evidence: Relay pricing is unknown; unknown price is not treated as zero.
  - id: G_EXPERIMENT_BUDGET_AUTHORIZATION
    status: BLOCKED_NOT_AUTHORIZED
    evidence: API credentials authorize authentication only. No explicit total-spend ceiling has been approved for the minimum 13,140 agent episodes; the paper protocol has a theoretical USD 52,560 ceiling.
  - id: G_FORMAL_DISK
    status: BLOCKED_CAPACITY
    evidence: The 2026-07-17 host measurement is 64.07 GB free on D out of 651.64 GB, below the 120 GB formal-run threshold. WSL sparse-volume capacity is not counted as independent host storage.
  - id: G_SERVER_RUNTIME
    status: BLOCKED_NO_CONTAINER_RUNTIME
    evidence: The scoped server directory exists under /public/home/mty/GeYugong/05_sweagent_repro_ser, but no usable container runtime has been validated. Server use is limited to controlled storage or API generation until a scoped gold-patch smoke passes.
  - id: G_EVALUATOR_REPLAY
    status: COMPLETE_11_FULL_REFERENCE_1_EXTERNAL_NETWORK_SEMANTIC
    evidence: >-
      Historical reports and evaluator edge branches replay exactly. One
      unmodified gold patch from every paper repository is validated: 11
      repositories have all reference outcomes, including one reused pytest
      environment, and Requests has 140/141 direct outcomes plus a
      deterministic local cross-host validation for the single unreachable
      public-network redirect test. This completes representative repository
      coverage, not full 300/2294-instance container replay.

