schema_version: 1
as_of: "2026-07-17"
paper: arxiv_2405.15793v3
source_archive: paper/2405.15793_source.tar.gz

status_semantics:
  SOURCE_ASSET_VERIFIED: Published source member is present and can be reconstructed, but no independent raw-run claim is implied.
  SOURCE_AGGREGATE_REBUILT_RAW_INPUT_BLOCKED: Published aggregate is regenerated from source values while instance-level inputs are not public.
  ARTIFACT_RECOMPUTED_EXACT: Author-released instance artifacts reproduce the published data exactly.
  ARTIFACT_RECOMPUTED_WITH_DOCUMENTED_GAP: Available author artifacts were replayed and every known missing record or paper inconsistency is quantified.
  ARTIFACT_AUDITED: Runtime prompts or interface implementations were exhaustively compared with the paper presentation.

